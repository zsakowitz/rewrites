<!doctype html>
<title>cv2</title>
<script src="./index.ts" type="module"></script>
<style>
    #main {
        display: grid;
        grid-template-columns: 438px 1fr;
        grid-template-rows: 46px 1fr;
        width: 100vw;
        height: 100vh;
        background-color: #101010;
    }

    #top-bar {
        grid-column: 1 / 3;
    }

    canvas {
        user-select: none;
        -webkit-user-select: none;
        touch-action: none;
        width: calc(100vw - 438px);
        height: calc(100vh - 46px);
    }

    body {
        margin: 0;
    }
</style>
<div id="main">
    <div id="top-bar"></div>
    <div id="sidebar"></div>
</div>
